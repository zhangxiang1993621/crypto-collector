name: Crypto Collector

on:
  schedule:
  - cron: '*/30 * * * *'
  - cron: 0 */2 * * *
  - cron: 0 8,20 * * *
  - cron: 0 8,20 * * *
  - cron: 0 8,20 * * *
  - cron: 0 8,20 * * *
  - cron: 0 8,20 * * *
  - cron: 0 12 * * *
  - cron: 0 8,20 * * *
  - cron: 0 9,21 * * *
  - cron: 0 8,20 * * *
  - cron: 0 8 * * *
  - cron: 0 8,20 * * *
  - cron: 0 8,20 * * *
  - cron: 0 8,20 * * *
  - cron: 30 21 * * 1-5
  - cron: 0 10 * * *
  - cron: 0 8,20 * * *
  - cron: 0 8,20 * * *
  - cron: 0 8,20 * * *
  - cron: 0 9,21 * * *
  workflow_dispatch: null

jobs:
  # ══════════════ httpx-only jobs ══════════════
  price_collector:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with: {python-version: '3.11'}
    - name: Install
      run: pip install -r requirements.txt
    - name: Run
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        COINCAP_API_KEY: ${{ secrets.COINCAP_API_KEY }}
      run: python crypto/price_collector.py || echo "[FAIL]"

  airdrop:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - {uses: actions/checkout@v4}
    - {uses: actions/setup-python@v5, with: {python-version: '3.11'}}
    - {run: pip install -r requirements.txt}
    - name: Run
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        POSTS_AUTHOR_USERNAME: ${{ vars.POSTS_AUTHOR_USERNAME }}
        HOT_TOKENS_CATEGORY_NAME: ${{ vars.HOT_TOKENS_CATEGORY_NAME }}
      run: python crypto/airdrop_scraper.py --save --max 20 || echo "[FAIL]"

  indo_news:
