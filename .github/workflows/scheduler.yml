name: Crypto Collector

on:
  schedule:
  - cron: '*/30 * * * *'
  - cron: 0 */2 * * *
  - cron: 0 8 * * *
  - cron: 0 10 * * *
  - cron: 0 */4 * * *
  - cron: 30 */2 * * *
  - cron: 0 */6 * * *
  - cron: 0 7,19 * * *
  - cron: 0 8,20 * * *
  - cron: '*/30 * * * *'
  - cron: 30 21 * * 1-5
  workflow_dispatch: null

jobs:
  # ────────────────── 无浏览器依赖 (httpx / API / WP REST) ──────────────────
  scrape_api:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run all httpx scrapers
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        COINCAP_API_KEY: ${{ secrets.COINCAP_API_KEY }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        HOT_TOKENS_CATEGORY_NAME: ${{ vars.HOT_TOKENS_CATEGORY_NAME }}
        INDO_CATEGORY_NAME: ${{ vars.INDO_CATEGORY_NAME }}
        PINTU_CATEGORY_NAME: ${{ vars.PINTU_CATEGORY_NAME }}
      shell: bash
      run: |
        set +e
        echo "::group::price_collector"
        python price_collector/main.py || echo "[FAIL] price_collector"
        echo "::endgroup::"

        echo "::group::airdrop_scraper"
        python airdrop_scraper/airdrop_scraper.py --save --max 20 || echo "[FAIL] airdrop_scraper"
        echo "::endgroup::"

        echo "::group::ai_digest"
        python ai_digest/ai_digest.py --save --max 10 || echo "[FAIL] ai_digest"
        echo "::endgroup::"

        echo "::group::bot_posts"
        python ai_digest/bot_posts.py --save --bots 5 || echo "[FAIL] bot_posts"
        echo "::endgroup::"

        echo "::group::indo_news"
        python indo_news_scraper/indo_news_scraper.py --save --max 15 || echo "[FAIL] indo_news"
        echo "::endgroup::"

        echo "::group::pintu"
        python pintu_scraper/pintu_scraper.py --save --max 15 || echo "[FAIL] pintu"
        echo "::endgroup::"

        echo "::group::tokocrypto"
        python tokocrypto_scraper/tokocrypto_scraper.py --save --max 10 || echo "[FAIL] tokocrypto"
        echo "::endgroup::"

        echo "::group::indodax"
        python indodax_scraper/indodax_scraper.py --save --max 15 || echo "[FAIL] indodax"
        echo "::endgroup::"

        echo "::group::mobee"
        python mobee_scraper/mobee_scraper.py --save --max 10 || echo "[FAIL] mobee"
        echo "::endgroup::"

        echo ""
        echo "=== scrape_api done ==="

  # ────────────────── 需浏览器 (Playwright Chromium) ──────────────────
  scrape_browser:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install deps + Chromium
      run: |
        pip install -r requirements.txt
        playwright install chromium
    - name: Run all Playwright scrapers
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        POSTS_AUTHOR_USERNAME: ${{ vars.POSTS_AUTHOR_USERNAME }}
        POSTS_CATEGORY_NAME: ${{ vars.POSTS_CATEGORY_NAME }}
        FIFA_CATEGORY_NAME: ${{ vars.FIFA_CATEGORY_NAME }}
        ESPers_CATEGORY_NAME: ${{ vars.ESPers_CATEGORY_NAME }}
      shell: bash
      run: |
        set +e
        echo "::group::news_scraper"
        python news_scraper/news_scraper.py --scroll 5 --max 50 --save || echo "[FAIL] news_scraper"
        echo "::endgroup::"

        echo "::group::fifa_scraper"
        python fifa_scraper/fifa_scraper.py --save || echo "[FAIL] fifa_scraper"
        echo "::endgroup::"

        echo "::group::fifa_blog"
        python fifa_blog_scraper/fifa_blog_scraper.py --save --max 30 || echo "[FAIL] fifa_blog"
        echo "::endgroup::"

        echo "::group::esports"
        python esports_scraper/esports_scraper.py --save --max 10 || echo "[FAIL] esports"
        echo "::endgroup::"

        echo "::group::worldcup"
        python worldcup_scraper/worldcup_scraper.py --save --today --max 20 || echo "[FAIL] worldcup"
        echo "::endgroup::"

        echo "::group::osl"
        python osl_scraper/osl_scraper.py --save --max 10 || echo "[FAIL] osl"
        echo "::endgroup::"

        echo "::group::bitget"
        python bitget_scraper/bitget_scraper.py --save --max 10 || echo "[FAIL] bitget"
        echo "::endgroup::"

        echo "::group::okx"
        python okx_scraper/okx_scraper.py --save --max 10 || echo "[FAIL] okx"
        echo "::endgroup::"

        echo ""
        echo "=== scrape_browser done ==="

  # ────────────────── CloakBrowser (美股) ──────────────────
  us_stock:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install system deps (Chromium)
      run: |
        pip install playwright
        playwright install-deps chromium
    - name: Install Python deps & CloakBrowser
      run: |
        pip install -r requirements.txt
        cloakbrowser install || echo "CloakBrowser verify skipped (segfault in CI, binary ready)"
    - name: US Stock Scraper
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python us_stock_scraper/us_stock_scraper.py --upload --backfill 4
